        <script>
            (function () {
                var splash = document.getElementById('dbwin-splash');
                if (!splash) return;
                var symbols = ['💵', '💰', '💸', '🪙', '💴', '💶', '💷'];
                for (var i = 0; i < 22; i++) {
                    var s = document.createElement('span');
                    s.className = 'money';
                    s.textContent = symbols[i % symbols.length];
                    s.style.left = Math.random() * 100 + 'vw';
                    s.style.animationDuration = (3 + Math.random() * 3.5).toFixed(2) + 's';
                    s.style.animationDelay = (Math.random() * 2.5).toFixed(2) + 's';
                    s.style.fontSize = (20 + Math.random() * 22).toFixed(0) + 'px';
                    splash.appendChild(s);
                }
                // Auto-hide once React paints (root has children) or after 8s safety
                var hide = function () {
                    if (splash.classList.contains('hide')) return;
                    splash.classList.add('hide');
                    setTimeout(function () { splash.remove(); }, 700);
                };
                var startedAt = Date.now();
                var MIN_VISIBLE = 600; // show splash for at least this long
                var root = document.getElementById('root');
                var check = setInterval(function () {
                    // Hide as soon as React has rendered ANYTHING into #root
                    // (the in-app loader, the dashboard, an error boundary, etc).
                    // Hanging the splash on a specific app-shell class meant
                    // that any time React was still mounting its initial loader
                    // the splash would sit on top of it for the entire 10s
                    // safety timeout — which on slow / production builds
                    // looked like an indefinite white screen with a spinner.
                    var rendered = root && root.children && root.children.length > 0;
                    var elapsed = Date.now() - startedAt;
                    if (rendered && elapsed >= MIN_VISIBLE) {
                        clearInterval(check);
                        hide();
                    }
                }, 100);
                // Safety: never block the user for more than 5s. If React
                // failed to mount we want the user to at least see a blank
                // page (and any error boundary / console output) rather than
                // a forever-spinning splash that hides the real state.
                setTimeout(function () { clearInterval(check); hide(); }, 5000);
                // Listen for an explicit signal from the app in case the
                // splash check is racing the first paint.
                window.addEventListener('app-ready', function () {
                    clearInterval(check);
                    hide();
                });
                // If the app fails to load any chunk, also hide the splash
                // immediately so the user can see the error rather than a
                // spinner that never goes away.
                window.addEventListener('error', function (e) {
                    var msg = e && e.message ? String(e.message) : '';
                    if (msg.indexOf('Loading chunk') !== -1 || msg.indexOf('ChunkLoadError') !== -1) {
                        clearInterval(check);
                        hide();
                    }
                });
            })();

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temporarily Unavailable</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #f48120;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: var(--card);
      padding: 40px 32px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent);
      margin: 0 auto 20px;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }

    p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
    }

    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo"></div>
    <h1>Site temporarily unavailable</h1>
    <p>We’ll be back soon. Thanks for your patience.</p>
    <div class="footer">Maintenance in progress</div>
  </div>
</body>
</html>
